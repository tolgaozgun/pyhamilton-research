name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_TAILSCALE_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: PROD_ENV_FILE
          script: |
            set -e
            mkdir -p /opt/hamilton-script-gen
            if [ ! -d /opt/hamilton-script-gen/.git ]; then
              git clone https://github.com/tolgaozgun/pyhamilton-research.git /opt/hamilton-script-gen
            fi
            cd /opt/hamilton-script-gen
            git pull origin main
            printf '%s' "$PROD_ENV_FILE" > .env
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build
            docker system prune -f
