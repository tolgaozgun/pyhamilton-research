appId: com.pyhamilton.agent
productName: PyHamilton Agent
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  identity: null
  notarize: false
win:
  target:
    - target: nsis
      arch:
        - x64
  sign: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
